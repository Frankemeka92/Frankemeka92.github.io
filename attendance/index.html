<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="main">
        <div class="logo">
            <img src="assets/logo.jpeg" alt="logo" width="100%">
        </div>
        <div class="card">
            <h2>Welcome to KIBU attendance</h2>
            <form action="" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Enter Username</label>
                    <input type="text" name="" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Enter Password</label>
                    <input type="password" name="" placeholder="*****">
                </div>
                <button class="btn-primary">Login</button>
                <button class="btn-register"><a href="register.html">Don't have an account? Register Now</a></button>
                <button class="btn-forget"><a href="reset.html">Forgot Password</a></button>
            </form>
        </div>
    </div>

</body>
</html>
